<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <style>
        body {
            background: white;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* MENU SUPERIOR */
        .pergunta {
            background: #333;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .pergunta input, .pergunta button {
            border-radius: 5px;
            padding: 5px;
        }

        /* BOTÃO MENU */
        .menu-btn {
            position: absolute;
            left: 15px;
            font-size: 20px;
            cursor: pointer;
            color: white;
        }

        /* MENU LATERAL */
        .menu-lateral {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: #222;
            padding-top: 60px;
            transition: 0.3s;
        }

        .menu-lateral a {
            display: block;
            padding: 15px;
            color: white;
            text-decoration: none;
        }

        .menu-lateral a:hover {
            background: #444;
            padding: 20px;
            transition: all 0.2s;
        }

        /* CONTEÚDO */
        .resposta-container {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <!-- MENU LATERAL -->
    <div id="menu" class="menu-lateral">
        <a href="#"><i class="bi bi-house"></i> Inicio</a>
        <a href="#">👤 Perfil</a>
        <a href="#">⚙️ Configurações</a>
        <a href="#">❌ Sair</a>
    </div>

    <!-- TOPO -->
    <nav class="pergunta">
        <span class="menu-btn" onclick="toggleMenu()">☰</span>

        <input type="text" id="inputResposta" placeholder="Resposta ...">
        <button id="botaoOk">OK</button>
    </nav>

    <!-- RESPOSTA -->
    <div class="resposta-container">
        <p id="resposta">Olá! 😊 Como posso te ajudar?</p> 
    </div>

    <script>
        const inputResposta = document.querySelector('#inputResposta');
        const botaoOk = document.querySelector('#botaoOk');
        const displayResposta = document.getElementById('resposta');
        const menu = document.getElementById('menu');

        function toggleMenu() {
            if (menu.style.left === "0px") {
                menu.style.left = "-250px";
            } else {
                menu.style.left = "0px";
            }
        }

        function conversar() {
            const mensagemUsuario = inputResposta.value.toLowerCase().trim();

            if (mensagemUsuario === "") {
                displayResposta.innerHTML = "Digite algo para conversarmos!";
                return;
            }

            if (mensagemUsuario.includes("oi") || mensagemUsuario.includes("olá")) {
                displayResposta.innerHTML = "Olá! Tudo bem com você?";
            } else if (mensagemUsuario.includes("bem")) {
                displayResposta.innerHTML = "Que bom! 😊";
            } else if (mensagemUsuario.includes("quem é você")) {
                displayResposta.innerHTML = "Sou um chatbot simples!";
            } else {
                displayResposta.innerHTML = "Ainda estou aprendendo 🤔";
            }

            inputResposta.value = "";
        }

        botaoOk.onclick = conversar;

        inputResposta.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                conversar();
            }
        });
    </script>

</body>
</html>
